name: CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Package with Gradle
        run: |
          cd Loto
          .\gradlew.bat clean build shadowJar -x startShadowScripts -x shadowDistTar -x shadowDistZip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loto-standalone-jar
          path: Loto/build/libs/*-all.jar
          if-no-files-found: error
